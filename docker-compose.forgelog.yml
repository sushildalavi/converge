services:
  event-backend:
    build:
      context: ./forgelog
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      EVENT_BACKEND_ADDR: :9090
      EVENT_BACKEND_DATA_DIR: /var/lib/event-backend
    ports:
      - "9090:9090"
    volumes:
      - event-backend-data:/var/lib/event-backend

  control-plane:
    environment:
      EVENT_BACKEND: event-backend
      EVENT_BACKEND_URL: http://event-backend:9090
    depends_on:
      - event-backend

volumes:
  event-backend-data:
