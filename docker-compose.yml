services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: replayforge_cp
      POSTGRES_PASSWORD: replayforge_cp_pwd
      POSTGRES_DB: replayforge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  control-plane:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://replayforge_cp:replayforge_cp_pwd@postgres:5432/replayforge
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  go-worker:
    build:
      context: ./worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://replayforge_cp:replayforge_cp_pwd@postgres:5432/replayforge
      REDIS_ADDR: redis:6379
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 2

volumes:
  postgres-data:
  redis-data:
