services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: replayforge
      POSTGRES_PASSWORD: replayforge
      POSTGRES_DB: replayforge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U replayforge -d replayforge"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: "0.3"

  backend:
    build:
      context: ./backend
      target: runtime
    restart: unless-stopped
    env_file: backend/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/live"]
      interval: 15s
      timeout: 4s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  worker:
    build:
      context: ./backend
      target: runtime
    command: ["python", "-m", "app.workers.worker"]
    # `restart: always` survives Docker daemon restarts AND simulated worker crashes.
    restart: always
    env_file: backend/.env
    healthcheck:
      # Worker doesn't run an HTTP server — health is reported via the workers table.
      # Disable the inherited healthcheck so compose doesn't report "unhealthy".
      disable: true
    # WORKER_NAME left empty in .env so each replica auto-derives a unique name from its hostname.
    # To run multiple workers locally:
    #   docker compose up -d --scale worker=3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    deploy:
      replicas: 3      # honored by Docker Compose v2.20+; for older versions use --scale worker=3
      resources:
        limits:
          memory: 384M
          cpus: "0.5"

  frontend:
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://backend:8000
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  postgres-data:
  redis-data:
